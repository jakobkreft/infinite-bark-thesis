# Bark Segmentation - Default Configuration

dataset:
  root: "dataset_step2"
  num_classes: 3
  class_names: ["Background", "Slepice / odrezane veje", "Mehanske poskodbe / odlusceno"]
  class_colors: [[0, 0, 0], [0, 255, 255], [255, 165, 0]]  # Black, Cyan, Orange

model:
  architecture: "DeepLabV3Plus"
  encoder: "resnet50"
  encoder_weights: "imagenet"

training:
  crop_size: 512
  batch_size: 8
  num_workers: 4
  epochs: 50
  crops_per_image: 8
  class_aware_ratio: 0.5

optimizer:
  name: "AdamW"
  lr: 1.0e-4
  weight_decay: 1.0e-4

scheduler:
  name: "CosineAnnealingWarmRestarts"
  T_0: 20
  T_mult: 2
  eta_min: 1.0e-7

loss:
  ce_weight: 0.5
  dice_weight: 0.5
  class_weights: [1.0, 15.0, 3.0]

validation:
  stride: 384
  eval_every: 2

inference:
  stride: 256
  use_gaussian_weights: true

early_stopping:
  patience: 20
  monitor: "val/mean_iou"

experiment:
  name: "deeplabv3plus_resnet50_30e"
  seed: 42
  mixed_precision: true
  device: "cuda:0"
  wandb_project: "bark-segmentation"
  wandb_enabled: false  # Set to true to enable wandb logging
